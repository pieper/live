<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>SlicerLive</title>
<script>
  window.__jsErrors = [];
  addEventListener('error', (e) => window.__jsErrors.push((e.message || e.type) + ' @ ' + (e.filename || '').split('/').pop() + ':' + (e.lineno || '')));
  addEventListener('unhandledrejection', (e) => window.__jsErrors.push('reject: ' + ((e.reason && (e.reason.stack || e.reason.message)) || e.reason)));
</script>
<style>
  html, body { margin: 0; height: 100%; background: #1a1a22; overflow: hidden;
               font: 12px/1.4 -apple-system, system-ui, sans-serif; }
  #status { position: fixed; left: 8px; bottom: 6px; z-index: 20; color: #9aa; pointer-events: none; }
  #err    { position: fixed; left: 8px; top: 8px;   z-index: 20; color: #f88; font-family: monospace; white-space: pre-wrap; }
</style>
</head>
<body>
<div id="status">SlicerLive — loading…</div>
<div id="err"></div>
<script>
  // SlicerLive viewer: ?scene=<url-to-a-.mrml> renders that scene full-window on the client GPU, no server.
  // The globals MUST be set before slicerlive-bundle.js evaluates (it reads them at module load).
  const _params = new URLSearchParams(location.search);
  const _scene = _params.get('scene') || '';
  const _ct = _params.get('ct') || '';           // client-side IDC: ?ct=<crdc_series_uuid>&seg=<crdc_series_uuid>
  const _seg = _params.get('seg') || '';
  const _roulette = _params.has('segroulette');   // SEGRoulette: spin a random IDC SEG (CT/MR/PET source) into the viewer
  window.__OFFLOAD_STANDALONE = true;            // full-window vtk.js render, no video / desktop compositor
  window.__SLICERLIVE_SCENE_URL = _scene;
  if (_ct) { window.__IDC_CT = _ct; window.__IDC_SEG = _seg; window.__IDC_MOD = _params.get('mod') || 'CT';
             window.__IDC_CTB = _params.get('ctb') || ''; window.__IDC_SEGB = _params.get('segb') || ''; }   // optional IDC buckets (default idc-open-data)
  if (_roulette) window.__SEGROULETTE = true;
  if (!_scene && !_ct && !_roulette) document.getElementById('err').textContent = 'No ?scene=<mrml-url>, ?ct=&seg=, or ?segroulette provided.';
  window.addEventListener('offload-build', (e) => {
    document.getElementById('status').textContent = 'SlicerLive ' + e.detail + (_scene ? '  •  ' + _scene : '');
  });
  // surface loader results for the debug harness + the status line
  const _iv = setInterval(() => {
    if (window.__slicerliveError) {
      document.getElementById('err').textContent = 'load error: ' + window.__slicerliveError; clearInterval(_iv);
    } else if (window.__slicerliveLoaded != null) {
      document.getElementById('status').textContent =
        'SlicerLive ' + (window.__offloadBuild || '') + '  •  ' + _scene + '  •  ' + window.__slicerliveLoaded + ' nodes';
      clearInterval(_iv);
    }
  }, 400);
  // load the bundle cache-busted so a fresh build is always picked up (dev loop) and a Pages/CDN deploy
  // never serves a stale cached copy. The globals above are already set, so the bundle reads them on eval.
  (function () { var s = document.createElement('script'); s.src = 'slicerlive-bundle.js?t=' + Date.now(); document.body.appendChild(s); })();
</script>
</body>
</html>
